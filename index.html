            --bg-body: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-card: #1e293b;

            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-purple: #a855f7;
            --accent-green: #4ade80;
            --header-bg: rgba(15, 23, 42, 0.85);
        }

        html.light {
            --bg-body: #f8fafc;
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f1f5f9;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-blue: #0284c7;
            --accent-purple: #7e22ce;

        * {

            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);

            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;

            position: sticky;
            top: 0;

            background-color: var(--header-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-badge {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));

            font-size: 0.85rem;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;

        }

        .logo-title {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--text-main), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-tabs {
            display: flex;
            gap: 0.5rem;
            background: var(--border-color);
            padding: 0.25rem;
            border-radius: 8px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.4rem 1rem;
            font-size: 0.88rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .tab-btn.active {
            background: var(--bg-card);
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .search-box {
            position: relative;
        }

        .search-input {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.4rem 0.8rem 0.4rem 2rem;
            border-radius: 6px;
            font-size: 0.85rem;
            outline: none;

            transition: width 0.3s ease;

        .search-input:focus {
            width: 280px;
            border-color: var(--accent-blue);
        }

        .search-icon {
            position: absolute;
            left: 0.6rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.88rem;
            display: flex;
            align-items: center;

            flex: 1;
            overflow: hidden;

            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            padding-left: 0.5rem;

            display: flex;

            gap: 0.25rem;
        }

            padding: 0.35rem 0.6rem;

            font-size: 0.85rem;

            background-color: var(--bg-card-hover);
            color: var(--accent-blue);
        }

        main {
            flex: 1;
            padding: 2.5rem 3.5rem;
            overflow-y: auto;
            max-width: 1100px;
            margin: 0 auto;

        .markdown-body {
            font-size: 1rem;
            color: var(--text-main);
        }

        .markdown-body h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1.2rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border-color);
            background: linear-gradient(90deg, var(--text-main), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .markdown-body h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-top: 2rem;
            margin-bottom: 0.8rem;
            color: var(--accent-blue);
        }

        .markdown-body h3 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.6rem;
        }

        .markdown-body p {
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        .markdown-body blockquote {
            background: rgba(56, 189, 248, 0.08);
            border-left: 4px solid var(--accent-blue);
            padding: 0.8rem 1.2rem;
            margin: 1.2rem 0;
            border-radius: 0 8px 8px 0;
            font-size: 0.95rem;

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            background: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);

        .markdown-body th, .markdown-body td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;

        .markdown-body th {
            background: var(--bg-card-hover);
            font-weight: 700;
            color: var(--accent-blue);
        }

        .markdown-body tr:last-child td {
            border-bottom: none;

        .markdown-body ul, .markdown-body ol {
            margin-left: 1.5rem;
            margin-bottom: 1rem;

        .markdown-body li {
            margin-bottom: 0.4rem;
        }

        .markdown-body code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-card-hover);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.85em;
            color: var(--accent-purple);
        }

        .markdown-body pre {
            background: #1e1e1e !important;
            padding: 1.2rem;

            overflow-x: auto;
            margin: 1.2rem 0;
            border: 1px solid var(--border-color);

        .markdown-body pre code {
            background: transparent;
            color: #d4d4d4;
            padding: 0;
        }

        .mermaid {
            display: flex;
            justify-content: center;
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin: 1.5rem 0;

        /* Responsive Design */
        @media (max-width: 900px) {
            aside {
                display: none;
            }
            main {
                padding: 1.5rem 1rem;
            }
            .search-input {
                width: 140px;
            }
            .search-input:focus {
                width: 180px;
            }
        }
    </style>

    <script>
        const PLAN_MD = "# Plan \u0110\u00e0o T\u1ea1o PM: Th\u00e0nh Th\u1ea1o AI Tools \u00d7 V\u1eadn H\u00e0nh AI Project\n\n> \u2705 **B\u1ea2N CH\u00cdNH TH\u1ee8C (C\u1eadp nh\u1eadt Tool-First)** \u2014 \u0110\u00e2y l\u00e0 plan \u0111\u00e0o t\u1ea1o PM ch\u00ednh th\u1ee9c c\u1ee7a c\u00f4ng ty, l\u1ea5y **th\u00e0nh th\u1ea1o AI Tool trong qu\u1ea3n l\u00fd d\u1ef1 \u00e1n** l\u00e0m tr\u1ecdng t\u00e2m (Tool-First), nh\u00fang **t\u01b0 duy & k\u1ef9 n\u0103ng v\u1eadn h\u00e0nh d\u1ef1 \u00e1n AI** (Agentic SDLC, Quality Gate, Token Economics, Risk, ROI) l\u00e0m b\u1ed1i c\u1ea3nh th\u1ef1c h\u00e0nh tr\u1ef1c ti\u1ebfp cho t\u1eebng b\u00e0i h\u1ecdc tool.\n>\n> **Ph\u1ea1m vi:** PM c\u00e1 nh\u00e2n \u1ee9ng d\u1ee5ng th\u00e0nh th\u1ea1o AI tools v\u00e0o c\u00f4ng vi\u1ec7c h\u00e0ng ng\u00e0y k\u1ebft h\u1ee3p v\u1eadn h\u00e0nh d\u1ef1 \u00e1n AI hi\u1ec7u qu\u1ea3  \n> **Timeline:** 6 th\u00e1ng  \n> **Framework:** `level-AI-PM-tools.md` (L1 \u2192 L5 t\u00edch h\u1ee3p Tool-First)  \n> **M\u1ee5c ti\u00eau c\u1ed1t l\u00f5i:** \u2265 50% PM \u0111\u1ea1t L3 sau 6 th\u00e1ng \u2014 t\u1ef1 ch\u1ee7 ho\u00e0n to\u00e0n v\u1edbi AI tools, c\u00f3 workflow ti\u1ebft ki\u1ec7m \u2265 30% th\u1eddi gian, \u0111\u1ea1t Adoption Rate \u2265 60% task PM h\u00e0ng ng\u00e0y v\u00e0 lead d\u1ef1 \u00e1n medium v\u1edbi ROI d\u01b0\u01a1ng.\n\n---\n\n## B\u01b0\u1edbc 1: Khung N\u0103ng L\u1ef1c (t\u00f3m t\u1eaft)\n\n> Chi ti\u1ebft \u0111\u1ea7y \u0111\u1ee7: xem `level-AI-PM-tools.md`\n\n| Level | Tool Milestone (Tr\u1ecdng t\u00e2m) | Operational Context (B\u1ed1i c\u1ea3nh) |\n|---|---|---|\n| **L1** \ud83c\udf31 | Onboarding AI tools; t\u1ef1 ch\u1ea1y 5 prompt + t\u1ea1o meeting notes t\u1eeb transcript | Shadow 1 sprint d\u01b0\u1edbi mentor PM L3+; hi\u1ec3u Agentic SDLC & Quality Gate c\u01a1 b\u1ea3n |\n| **L2** \ud83e\udd49 | Prompt library \u2265 10 prompt; PRD draft < 30 ph\u00fat; Status report b\u1eb1ng AI | Solo PM d\u1ef1 \u00e1n nh\u1ecf \u2264 3 sprint, token trong budget, ROI Drill 1 & Quality Gate Drill 5 pass |\n| **L3** \ud83e\udd48 | AI Workflow t\u00edch h\u1ee3p to\u00e0n b\u1ed9 sprint cycle (ti\u1ebft ki\u1ec7m \u2265 30% th\u1eddi gian); Tool Selection Matrix; \u2265 1 template team adopt | Lead medium project, ROI d\u01b0\u01a1ng, 30-Day Rollout pass, Token forecast \u00b120% (Drill 2), Risk Register (Drill 3), Stakeholder Report & Video (Drill 4) |\n| **L4** \ud83e\udd47 | Custom GPT/Agent team \u0111ang d\u00f9ng; Automation (Zapier/Make); AI tool guideline | Multi-project orchestration, coach \u2265 2 PM l\u00ean L2, contract/pricing model v\u1edbi AI buffer |\n| **L5** \ud83d\udc8e | AI tool strategy org-level + governance & security framework | Lead transformation \u2265 1 SBU, ROI measurement c\u1ea5p t\u1ed5 ch\u1ee9c, thought leadership |\n\n---\n\n## B\u01b0\u1edbc 2: L\u1ed9 Tr\u00ecnh \u0110\u00e0o T\u1ea1o Theo Transition (Tool-First Approach)\n\n### L0 \u2192 L1 \u2014 AI Tool Onboarding & Basic PM Tasks (~2-3 tu\u1ea7n)\n\n**M\u1ee5c ti\u00eau k\u00e9p:**\n- *Tool (Tr\u1ecdng t\u00e2m):* Bi\u1ebft landscape AI tools \u0111ang c\u00f3, s\u1eed d\u1ee5ng th\u00e0nh th\u1ea1o prompt s\u1eb5n, l\u00e0m quen v\u1edbi ChatGPT, Claude, Notion AI, Jira AI & Microsoft Copilot.\n- *Operational (B\u1ed1i c\u1ea3nh):* Hi\u1ec3u t\u01b0 duy Agentic SDLC, 3 mental model shifts, Quality Gate v\u00e0 Token Economics c\u01a1 b\u1ea3n.\n\n| # | Kh\u00f3a h\u1ecdc | N\u1ed9i dung | H\u00ecnh th\u1ee9c | Th\u1eddi l\u01b0\u1ee3ng | B\u1eaft bu\u1ed9c? |\n|---|---|---|---|---|---|\n| 1 | **Gi\u1edbi thi\u1ec7u AI Tools cho PM & Context Agentic SDLC** | Landscape AI tools: ChatGPT, Claude, Notion AI, Jira AI, **Microsoft Copilot**; tool n\u00e0o d\u00f9ng cho vi\u1ec7c g\u00ec; b\u1ed1i c\u1ea3nh PM l\u00e0 Orchestrator h\u1ec7 Ng\u01b0\u1eddi + AI trong Agentic SDLC | Internal training | 1 bu\u1ed5i \u00d7 2h | B\u1eaft bu\u1ed9c |\n| 2 | **Th\u1ef1c h\u00e0nh v\u1edbi Prompt Library & Task c\u01a1 b\u1ea3n** | Ch\u1ea1y th\u1eed \u2265 5 prompt c\u00f3 s\u1eb5n t\u1eeb th\u01b0 vi\u1ec7n team; so s\u00e1nh output gi\u1eefa c\u00e1c tool; th\u1ef1c h\u00e0nh t\u00f3m t\u1eaft meeting transcript th\u00f4 \u2192 meeting notes ho\u00e0n ch\u1ec9nh, draft email, t\u00f3m t\u1eaft doc | Workshop hands-on | 1 bu\u1ed5i \u00d7 2h | B\u1eaft bu\u1ed9c |\n| 3 | **Quality Gate & Token Economics c\u01a1 b\u1ea3n** | Quality Gate l\u00e0 g\u00ec, t\u1ea1i sao kh\u00f4ng bypass; token cost l\u00e0 g\u00ec, c\u00e1ch xem dashboard; t\u1ea1i sao PM ph\u1ea3i n\u1eafm chi ph\u00ed v\u00e0 ch\u1ea5t l\u01b0\u1ee3ng khi d\u00f9ng AI tools | Internal training | 1 bu\u1ed5i \u00d7 2h | B\u1eaft bu\u1ed9c |\n| 4 | **Shadow Sprint (OJT)** | Shadow 1 sprint th\u1ef1c t\u1ebf d\u01b0\u1edbi mentor PM L3+; quan s\u00e1t PM L3+ s\u1eed d\u1ee5ng AI tools trong th\u1ef1c t\u1ebf, x\u1eed l\u00fd Quality Gate, token tracking v\u00e0 b\u00e1o c\u00e1o | OJT | 1 sprint (~2 tu\u1ea7n) | B\u1eaft bu\u1ed9c |\n\n**Milestone L1:** Onboarding xong + quiz 70% + shadow sprint sign-off + t\u1ef1 ch\u1ea1y 5 prompt t\u1eeb th\u01b0 vi\u1ec7n + t\u1ef1 t\u1ea1o 1 meeting notes ho\u00e0n ch\u1ec9nh t\u1eeb transcript b\u1eb1ng AI.\n\n---\n\n### L1 \u2192 L2 \u2014 AI cho Standard PM Tasks & Artifacts (~4-6 tu\u1ea7n)\n\n**M\u1ee5c ti\u00eau k\u00e9p:**\n- *Tool (Tr\u1ecdng t\u00e2m):* T\u1ef1 vi\u1ebft prompt chu\u1ea9n c\u1ea5u tr\u00fac; AI h\u1ed7 tr\u1ee3 t\u1ea1o to\u00e0n b\u1ed9 PM artifacts (User Story, AC, PRD, Status Report); x\u00e2y prompt library c\u00e1 nh\u00e2n \u2265 10 prompt.\n- *Operational (B\u1ed1i c\u1ea3nh):* Solo PM d\u1ef1 \u00e1n nh\u1ecf (\u2264 3 sprint), t\u1ef1 track token, \u00e1p d\u1ee5ng Quality Gate, t\u00ednh ROI (Drill 1) v\u00e0 th\u1ef1c h\u00e0nh Quality Gate role-play (Drill 5).\n\n| # | Kh\u00f3a h\u1ecdc | N\u1ed9i dung | H\u00ecnh th\u1ee9c | Th\u1eddi l\u01b0\u1ee3ng | B\u1eaft bu\u1ed9c? |\n|---|---|---|---|---|---|\n| 5 | **Prompt Engineering c\u01a1 b\u1ea3n cho PM** | C\u1ea5u tr\u00fac prompt chu\u1ea9n: Role + Context + Y\u00eau c\u1ea7u + Format + V\u00ed d\u1ee5; k\u1ef9 n\u0103ng cung c\u1ea5p context \u0111\u00fang; c\u00e1ch refine khi AI output sai ho\u1eb7c thi\u1ebfu | Internal workshop | 1 bu\u1ed5i \u00d7 2h | B\u1eaft bu\u1ed9c |\n| 6 | **AI-assisted User Story & Acceptance Criteria** | Generate User Story t\u1eeb requirement/PRD th\u00f4; generate Acceptance Criteria t\u1eeb User Story; review & audit output AI (ph\u00e1t hi\u1ec7n vague requirement, missing edge case) | Workshop + drill | 1 bu\u1ed5i \u00d7 2h | B\u1eaft bu\u1ed9c |\n| 7 | **AI-assisted PRD** | T\u1ea1o PRD draft t\u1eeb brief input trong < 30 ph\u00fat; structure PRD v\u1edbi AI; \u0111i\u1ec1n chi ti\u1ebft t\u1eebng section; review checklist tr\u01b0\u1edbc khi giao Dev | Workshop + drill | 1 bu\u1ed5i \u00d7 2h | B\u1eaft bu\u1ed9c |\n| 8 | **AI-assisted Status Report (non-technical)** | Vi\u1ebft Status Report 1 trang cho stakeholder non-technical t\u1eeb sprint data; d\u00f9ng AI translate velocity/defect/token sang ng\u00f4n ng\u1eef kinh doanh | Workshop + drill | 1 bu\u1ed5i \u00d7 2h | B\u1eaft bu\u1ed9c |\n| 9 | **ROI Calculation v\u1edbi AI \u2014 Drill 1** | D\u00f9ng AI h\u1ed7 tr\u1ee3 t\u00ednh effort traditional vs AI-enhanced; token cost; net savings; ROI %; format b\u1ea3ng defendable tr\u01b0\u1edbc Tech Lead | Self-practice + review | 2h | B\u1eaft bu\u1ed9c |\n| 10 | **Quality Gate Role-play \u2014 Drill 5** | AI t\u1ea1o 3 scenario practice (deadline pressure, score d\u01b0\u1edbi ng\u01b0\u1ee1ng, kh\u00e1ch push back); role-play gi\u1eef v\u1eefng Quality Gate v\u1edbi peer/AI | Workshop role-play | 1 bu\u1ed5i \u00d7 2h | B\u1eaft bu\u1ed9c |\n| 11 | **AI-assisted Token Tracking (Skill Tool)** | D\u00f9ng AI \u0111\u1ecdc v\u00e0 t\u00f3m t\u1eaft token dashboard; nh\u1eadn di\u1ec7n task/agent ng\u1ed1n token; ph\u00e2n bi\u1ec7t spike b\u00ecnh th\u01b0\u1eddng vs b\u1ea5t th\u01b0\u1eddng; vi\u1ebft weekly token summary | Workshop + drill | 1 bu\u1ed5i \u00d7 2h | B\u1eaft bu\u1ed9c |\n| 12 | **X\u00e2y d\u1ef1ng Prompt Library c\u00e1 nh\u00e2n** | Template l\u01b0u prompt (task, tool, context c\u1ea7n c\u00f3, output expect); peer review; m\u1ee5c ti\u00eau \u2265 10 prompt t\u00e1i s\u1eed d\u1ee5ng c\u00f3 metadata | Self-practice + peer | 2h | B\u1eaft bu\u1ed9c |\n| 13 | **OJT: Solo PM d\u1ef1 \u00e1n nh\u1ecf** | \u00c1p d\u1ee5ng AI tools v\u00e0o d\u1ef1 \u00e1n th\u1ef1c \u2264 3 sprint: PRD + User Story + Status Report + token tracking + Quality Gate; mentor PM L3+ support | OJT | 3\u20134 tu\u1ea7n | B\u1eaft bu\u1ed9c |\n\n**Milestone L2:** Solo PM \u2264 3 sprint, KPI baseline \u0111\u1ea1t, token cost trong budget + PRD draft < 30 ph\u00fat + Status Report non-technical pass + ROI Drill 1 pass + Quality Gate Drill 5 pass + Prompt Library \u2265 10 prompt + nh\u1eadn di\u1ec7n & gi\u1ea3i th\u00edch \u0111\u01b0\u1ee3c spike token.\n\n---\n\n### L2 \u2192 L3 \u2014 Advanced AI Workflow & Team Standardization (~6-8 tu\u1ea7n)\n\n**M\u1ee5c ti\u00eau k\u00e9p:**\n- *Tool (Tr\u1ecdng t\u00e2m):* T\u00edch h\u1ee3p AI v\u00e0o to\u00e0n b\u1ed9 quy tr\u00ecnh sprint cycle; c\u00f3 Tool Selection Matrix (ch\u1ecdn \u0111\u00fang tool cho \u0111\u00fang task); workflow ti\u1ebft ki\u1ec7m \u2265 30% th\u1eddi gian; chu\u1ea9n h\u00f3a template cho team.\n- *Operational (B\u1ed1i c\u1ea3nh):* Lead d\u1ef1 \u00e1n medium \u0111\u1ed9c l\u1eadp (30-Day Rollout pass, ROI d\u01b0\u01a1ng); Token forecast \u00b120% (Drill 2); Risk Register 15 risks (Drill 3); Stakeholder Report & Video (Drill 4); minh b\u1ea1ch ch\u00ednh s\u00e1ch d\u00f9ng AI v\u1edbi kh\u00e1ch.\n\n| # | Kh\u00f3a h\u1ecdc | N\u1ed9i dung | H\u00ecnh th\u1ee9c | Th\u1eddi l\u01b0\u1ee3ng | B\u1eaft bu\u1ed9c? |\n|---|---|---|---|---|---|\n| 14 | **Prompt n\u00e2ng cao & AI Workflow cho Sprint Cycle** | Chain-of-thought; few-shot examples; t\u00edch h\u1ee3p AI v\u00e0o Sprint Planning (breakdown, estimate, risk check), Backlog Refinement (refine story, priority), Retrospective (pattern analysis) | Internal workshop | 2 bu\u1ed5i \u00d7 2h | B\u1eaft bu\u1ed9c |\n| 15 | **Token Budget Forecast \u2014 Drill 2** | D\u00f9ng AI ph\u00e2n t\u00edch 3 sprint data; x\u00e2y forecast best/expected/worst case; confidence interval; m\u1ee5c ti\u00eau \u00b120% actual | Workshop + drill | 1 bu\u1ed5i \u00d7 2h | B\u1eaft bu\u1ed9c |\n| 16 | **Risk Management AI Project \u2014 Drill 3** | AI generate Risk Register 15 risks (5 AI-specific: hallucination, vendor lock-in, token variance, team resistance, data leak); human verify, prioritize T1-T4, g\u00e1n owner + mitigation | Workshop + drill | 2 bu\u1ed5i \u00d7 2h | B\u1eaft bu\u1ed9c |\n| 17 | **Stakeholder Education & AI Transparency \u2014 Drill 4** | AI translate AI metrics \u2192 business value (Lead Time \u2193, Defect Density \u2193, Cost/feature \u2193); ch\u00ednh s\u00e1ch minh b\u1ea1ch khi d\u00f9ng AI v\u1edbi kh\u00e1ch; Status Report 1 trang + video walkthrough 5 ph\u00fat | Workshop + peer review | 2 bu\u1ed5i \u00d7 2h | B\u1eaft bu\u1ed9c |\n| 18 | **AI-assisted Sprint Data Analysis** | D\u00f9ng AI ph\u00e2n t\u00edch Quality Velocity trend, token cost/feature, defect density; t\u1eeb raw data \u2192 actionable insight \u2192 adjustment plan | Workshop + drill | 1 bu\u1ed5i \u00d7 2h | B\u1eaft bu\u1ed9c |\n| 19 | **Ch\u1ecdn \u0110\u00fang Tool Cho \u0110\u00fang Task (Tool Selection Matrix)** | So s\u00e1nh chuy\u00ean s\u00e2u ChatGPT vs Claude vs Gemini vs Copilot vs Notion/Jira AI cho c\u00e1c PM use cases; x\u00e2y d\u1ef1ng Tool Selection Matrix cho team | Discussion + hands-on | 1 bu\u1ed5i \u00d7 2h | B\u1eaft bu\u1ed9c |\n| 20 | **Anti-pattern Workshop** | 10 anti-pattern th\u01b0\u1eddng g\u1eb7p (b\u1ed5 sung: *\"D\u00f9ng AI nh\u01b0ng gi\u1ea5u kh\u00e1ch h\u00e0ng\"*, *\"Th\u1ea5y tool m\u1edbi d\u00f9ng t\u00f9y ti\u1ec7n thi\u1ebfu chi\u1ebfn l\u01b0\u1ee3c\"*, *\"Bypass Quality Gate\"*); case study & th\u1ea3o lu\u1eadn | Discussion + AI case prep | 1 bu\u1ed5i \u00d7 2h | B\u1eaft bu\u1ed9c |\n| 21 | **Chu\u1ea9n h\u00f3a Prompt Template cho Team** | X\u00e2y prompt library team-level; vi\u1ebft h\u01b0\u1edbng d\u1eabn (when to use, input c\u1ea7n c\u00f3, output expect); peer workshop chia s\u1ebb best practice | Workshop + peer share | 1 bu\u1ed5i \u00d7 2h | B\u1eaft bu\u1ed9c |\n| 22 | **OJT: Lead Medium Project (Workflow AI \u0111\u1ea7y \u0111\u1ee7)** | \u00c1p d\u1ee5ng 30-Day Rollout v\u1edbi AI workflow to\u00e0n di\u1ec7n; track Adoption Rate + Th\u1eddi gian ti\u1ebft ki\u1ec7m + Quality Velocity + Token Cost/Feature; PM L4+ gi\u00e1m s\u00e1t | OJT | 4\u20135 tu\u1ea7n | B\u1eaft bu\u1ed9c |\n\n**Milestone L3:** Lead medium project ROI d\u01b0\u01a1ng + Drill 2, 3, 4 pass + workflow AI ti\u1ebft ki\u1ec7m \u2265 30% th\u1eddi gian (c\u00f3 data \u0111o) + Adoption Rate \u2265 60% task PM ti\u00eau chu\u1ea9n + \u2265 1 template team adopt + h\u01b0\u1edbng d\u1eabn \u0111\u01b0\u1ee3c PM L2.\n\n---\n\n### L3 \u2192 L4 \u2014 Custom Tools & Team Coaching (~tham kh\u1ea3o, ngo\u00e0i 6 th\u00e1ng)\n\n| # | Kh\u00f3a h\u1ecdc | H\u00ecnh th\u1ee9c | Th\u1eddi l\u01b0\u1ee3ng |\n|---|---|---|---|\n| 23 | **Custom GPT & AI Agent cho PM Workflow** \u2014 X\u00e2y GPT/Agent ri\u00eang cho User Story generation, Risk Assessment, Sprint Report | Workshop | 2 bu\u1ed5i |\n| 24 | **AI Automation v\u1edbi Zapier / Make / n8n** \u2014 Token cost alert t\u1ef1 \u0111\u1ed9ng; auto-generate sprint digest t\u1eeb Jira; Slack digest | Advanced workshop | 2 bu\u1ed5i |\n| 25 | **Coaching & Mentoring PM v\u1edbi AI** \u2014 Framework coach PM L1/L2; d\u00f9ng AI t\u1ea1o drill scenario cho mentee | Workshop | 2 bu\u1ed5i |\n| 26 | **Multi-project Orchestration v\u1edbi AI** \u2014 Custom dashboard t\u1ed5ng h\u1ee3p multi-project status; capacity planning mix Ng\u01b0\u1eddi + AI | Advanced workshop | 2 bu\u1ed5i |\n| 27 | **Contract & Pricing AI Project** \u2014 Buffer token 20\u201330%; outcome-billing model; d\u00f9ng AI t\u00ednh pricing scenario | Internal | 1 bu\u1ed5i |\n| 28 | **AI Tool Evaluation & Guideline** \u2014 Ti\u00eau ch\u00ed \u0111\u00e1nh gi\u00e1 tool m\u1edbi; security checklist; acceptable use policy cho team | Internal | 1 bu\u1ed5i |\n\n---\n\n### L4 \u2192 L5 \u2014 SBU Strategy & Thought Leadership (~tham kh\u1ea3o)\n\n| # | Kh\u00f3a h\u1ecdc | H\u00ecnh th\u1ee9c |\n|---|---|---|\n| 29 | **AI Tool Strategy cho SBU** \u2014 Roadmap adoption, budget planning, governance & security framework | Strategic workshop |\n| 30 | **ROI Measurement AI Tool Adoption** \u2014 Framework \u0111o ROI adoption \u1edf c\u1ea5p t\u1ed5 ch\u1ee9c; present cho leadership | Internal |\n| 31 | **Thought Leadership** \u2014 Vi\u1ebft article, prepare talk v\u1ec1 AI Tools & Operations; build personal brand | Mentoring + writing |\n\n---\n\n## B\u01b0\u1edbc 3: Survey \u0110\u00e1nh Gi\u00e1 Level Hi\u1ec7n T\u1ea1i\n\nG\u1eedi survey t\u1ef1 \u0111\u00e1nh gi\u00e1 **tr\u01b0\u1edbc khi b\u1eaft \u0111\u1ea7u ch\u01b0\u01a1ng tr\u00ecnh** \u2014 b\u1eaft bu\u1ed9c \u0111\u1ec3 thu th\u1eadp baseline.\n\n**C\u00e1c c\u00e2u h\u1ecfi \u0111\u00e1nh gi\u00e1 k\u1ebft h\u1ee3p (Tool & Operational):**\n\n| Chi\u1ec1u | C\u00e2u h\u1ecfi \u0111\u00e1nh gi\u00e1 | Ph\u00e2n bi\u1ec7t level |\n|---|---|---|\n| **Tool** | B\u1ea1n c\u00f3 th\u1ec3 t\u1ef1 vi\u1ebft prompt chu\u1ea9n c\u1ea5u tr\u00fac m\u00e0 kh\u00f4ng c\u1ea7n template s\u1eb5n kh\u00f4ng? | L1 vs L2 |\n| **Tool** | B\u1ea1n \u0111\u00e3 d\u00f9ng AI t\u1ea1o PRD (<30m), User Story, hay Status Report ch\u01b0a? | L1 vs L2 |\n| **Tool** | B\u1ea1n c\u00f3 Prompt Library c\u00e1 nh\u00e2n kh\u00f4ng? Bao nhi\u00eau prompt? | L2 vs L3 |\n| **Tool** | AI c\u00f3 trong workflow h\u00e0ng ng\u00e0y c\u1ee7a b\u1ea1n kh\u00f4ng (% task PM c\u00f3 AI h\u1ed7 tr\u1ee3)? | L2 vs L3 (Target \u2265 60%) |\n| **Tool** | B\u1ea1n c\u00f3 bi\u1ebft c\u00e1ch ch\u1ecdn \u0111\u00fang tool (ChatGPT/Claude/Copilot...) cho \u0111\u00fang task kh\u00f4ng? | L2 vs L3 |\n| **Tool** | B\u1ea1n \u0111\u00e3 x\u00e2y Custom GPT/Agent ho\u1eb7c Automation v\u1edbi AI ch\u01b0a? | L3 vs L4 |\n| **Operational** | B\u1ea1n \u0111\u00e3 t\u1ef1 lead d\u1ef1 \u00e1n c\u00f3 d\u00f9ng AI ch\u01b0a? Scope bao nhi\u00eau? | L1 vs L2 |\n| **Operational** | B\u1ea1n c\u00f3 l\u00e0m weekly token summary & forecast budget kh\u00f4ng? | L2 vs L3 |\n| **Operational** | B\u1ea1n \u0111\u00e3 lead d\u1ef1 \u00e1n medium v\u1edbi ROI d\u01b0\u01a1ng & pass 30-Day Rollout ch\u01b0a? | L2 vs L3 |\n\n### B\u1ea3ng mapping nh\u00e2n s\u1ef1\n\n| STT | H\u1ecd t\u00ean | Level Tool | Level Operational | Level confirm | Gap ch\u00ednh | \u01afu ti\u00ean | Ghi ch\u00fa |\n|---|---|---|---|---|---|---|---|\n| 1 | | | | | | | |\n| 2 | | | | | | | |\n| 3 | | | | | | | |\n| ... | | | | | | | |\n\n> **Ghi ch\u00fa:** Level confirm = min(Level Tool, Level Operational). \u0110\u00e0o t\u1ea1o theo h\u01b0\u1edbng Tool-First \u0111\u1ec3 th\u00e1o g\u1ee1 gap tool cho PM tr\u01b0\u1edbc.\n\n---\n\n## B\u01b0\u1edbc 4: M\u1ee5c Ti\u00eau T\u1ef7 L\u1ec7 Level & 4 KPI C\u1ed1t L\u00f5i (6 th\u00e1ng)\n\n| Th\u1eddi \u0111i\u1ec3m | L0 | L1 | L2 | L3 | L4 | L5 |\n|---|---|---|---|---|---|---|\n| **T0 \u2014 Hi\u1ec7n t\u1ea1i** | _ | _ | _ | _ | _ | _ |\n| **T+2 th\u00e1ng** | 0 | 40% | 50% | 10% | 0 | 0 |\n| **T+4 th\u00e1ng** | 0 | 10% | 50% | 35% | 5% | 0 |\n| **T+6 th\u00e1ng** | 0 | 0 | 30% | 55% | 15% | 0 |\n\n**4 KPI \u0111o l\u01b0\u1eddng ti\u1ebfn \u0111\u1ed9 ch\u00ednh:**\n1. **Th\u1eddi gian ti\u1ebft ki\u1ec7m/tu\u1ea7n** \u2014 khi t\u1ea1o PM artifacts b\u1eb1ng AI (target L3: \u2265 30%)\n2. **Adoption Rate** \u2014 % task PM h\u00e0ng ng\u00e0y c\u00f3 AI h\u1ed7 tr\u1ee3 (target L3: \u2265 60% task ti\u00eau chu\u1ea9n)\n3. **Prompt Library Size & Template Team Adoption** \u2014 Target L2: \u2265 10 prompt c\u00e1 nh\u00e2n; Target OJT Lead Medium Project (30-Day Rollout) | PM \u2265 L2 | Live project | \u0110o Adoption Rate & Saved Time |\n| **T6** | T3 | Review t\u1ed5ng k\u1ebft \u2014 Showcase AI Workflow & Template hay nh\u1ea5t | To\u00e0n PM | Seminar | Chia s\u1ebb th\u00e0nh qu\u1ea3 team |\n| **T6** | T4 | L3 Assessment ch\u00ednh th\u1ee9c | PM \u0111\u1ee7 \u0111i\u1ec1u ki\u1ec7n | PM Lead \u0111\u00e1nh gi\u00e1 | C\u1ea5p Badge L3 |\n\n---\n\n## Anti-patterns c\u1ea7n tr\u00e1nh\n\n| Anti-pattern | Tri\u1ec7u ch\u1ee9ng | C\u00e1ch ph\u00f2ng |\n|---|---|---|\n| **D\u00f9ng AI nh\u01b0ng gi\u1ea5u kh\u00e1ch h\u00e0ng (thi\u1ebfu minh b\u1ea1ch)** | Gi\u1ea5u vi\u1ec7c d\u00f9ng AI, kh\u00e1ch ph\u00e1t hi\u1ec7n ra d\u1eabn \u0111\u1ebfn m\u1ea5t trust nghi\u00eam tr\u1ecdng | C\u00f3 ch\u00ednh s\u00e1ch AI transparency: minh b\u1ea1ch ph\u1ea1m vi AI h\u1ed7 tr\u1ee3, kh\u1eb3ng \u0111\u1ecbnh human ch\u1ecbu tr\u00e1ch nhi\u1ec7m cu\u1ed1i c\u00f9ng |\n| **Th\u1ea5y tool m\u1edbi d\u00f9ng t\u00f9y ti\u1ec7n thi\u1ebfu chi\u1ebfn l\u01b0\u1ee3c** | Th\u1eed qu\u00e1 nhi\u1ec1u tool c\u00f9ng l\u00fac, kh\u00f4ng n\u1eafm s\u00e2u tool n\u00e0o, ph\u00e2n t\u00e1n data | Th\u1ef1c thi Tool Selection Matrix; chu\u1ea9n h\u00f3a danh s\u00e1ch tool c\u00f4ng ty c\u1ea5p license v\u00e0 b\u1ea3o m\u1eadt |\n| **H\u1ecdc l\u00fd thuy\u1ebft, kh\u00f4ng th\u1ef1c h\u00e0nh tool ngay** | Bi\u1ebft c\u1ea5u tr\u00fac prompt nh\u01b0ng kh\u00f4ng \u00e1p d\u1ee5ng v\u00e0o sprint \u0111ang ch\u1ea1y | H\u1ecdc b\u00e0i n\u00e0o th\u1ef1c h\u00e0nh tr\u00ean task th\u1eadt b\u00e0i \u0111\u00f3 (Tool-First); n\u1ed9p b\u00e0i t\u1eadp ngay trong tu\u1ea7n |\n| **Bypass Quality Gate v\u00ec deadline** | \"L\u1ea7n n\u00e0y th\u00f4i, l\u1ea7n sau b\u00f9\" | Emergency Bypass \u0111\u00fang quy tr\u00ecnh; never silent skip |\n| **Kh\u00f4ng track token / tool usage** | Sprint 3 v\u1ee1 budget tool/token m\u00e0 kh\u00f4ng hi\u1ec3u l\u00fd do | Token/Tool tracking l\u00e0 KPI h\u00e0ng \u1ee5ng AI tools cho PM th\u1ef1c t\u1ebf | L2+ |\n\n### \u0110\u1ec3 hi\u1ec3u B\u1ed1i c\u1ea3nh V\u1eadn h\u00e0nh D\u1ef1 \u00e1n AI (Agentic SDLC Foundation)\n| T\u00e0i li\u1ec7u | L\u00fd do \u0111\u1ecdc | Level |\n|---|---|---|\n| *The Phoenix Project* \u2014 Gene Kim | Flow thinking, throughput & resource efficiency | L0\u2192L1 |\n| *Accelerate* \u2014 Forsgren, Humble, Kim | DORA metrics, evidence-based engineering | L1\u2192L2 |\n| *Inspired* \u2014 Marty Cagan | Outcome > Output mindset | L1\u2192L2 |\n| *Crucial Conversations* \u2014 Patterson et al. | K\u1ef9 n\u0103ng t\u1eeb ch\u1ed1i Quality Gate bypass & l\u00e0m vi\u1ec7c v\u1edbi Stakeholders | L2\u2192L3 |\n\n---\n\n## Checklist T\u1ed5ng H\u1ee3p\n\n- [ ] Thu survey + collect 2 baseline: Level n\u0103ng l\u1ef1c & th\u1eddi gian/t\u1ea7n su\u1ea5t l\u00e0m task hi\u1ec7n t\u1ea1i \u2014 **l\u00e0m \u0111\u1ea7u ti\u00ean**\n- [ ] Setup tool access: X\u00e1c nh\u1eadn t\u00e0i kho\u1ea3n ChatGPT / Claude / Notion AI / Jira AI / Microsoft Copilot cho to\u00e0n b\u1ed9 PM\n- [ ] Confirm Data Security & AI Transparency Policy: Lo\u1ea1i data n\u00e0o \u0111\u01b0\u1ee3c/kh\u00f4ng \u0111\u01b0\u1ee3c \u0111\u01b0a v\u00e0o AI tool; quy \u0111\u1ecbnh minh b\u1ea1ch v\u1edbi kh\u00e1ch\n- [ ] X\u00e2y d\u1ef1ng Prompt Library seed (\u2265 20 prompt chu\u1ea9n) \u0111\u1ec3 team s\u1eed d\u1ee5ng ngay t\u1eeb ng\u00e0y 1\n- [ ] Confirm PM L4+ l\u00e0m trainer v\u00e0 mentor (ng\u01b0\u1eddi s\u1eed d\u1ee5ng th\u00e0nh th\u1ea1o AI tools & hi\u1ec3u v\u1eadn h\u00e0nh d\u1ef1 \u00e1n)\n- [ ] Kick-off v\u1edbi live demo AI tools \u2014 kh\u00f4ng slide l\u00fd thuy\u1ebft thu\u1ea7n t\u00fay\n- [ ] Setup c\u01a1 ch\u1ebf track h\u00e0ng th\u00e1ng: Saved Time, Adoption Rate (\u226560%), Drill Pass Rate, Token Forecast Accuracy\n\n---\n\n*T\u00e0i li\u1ec7u n\u00e0y l\u00e0 template ch\u00ednh th\u1ee9c theo m\u00f4 h\u00ecnh Tool-First \u2014 c\u1ea7n \u0111i\u1ec1n s\u1ed1 li\u1ec7u th\u1ef1c t\u1 * **00:30 - 01:10 (40m) \u2014 L\u00fd thuy\u1ebft & Nguy\u00ean t\u1eafc x\u1eed l\u00fd Meeting Transcript**\n  * Gi\u1edbi thi\u1ec7u Prompt Library Seed c\u1ee7a c\u00f4ng ty.\n  * C\u00e1ch tr\u00edch xu\u1ea5t transcript t\u1eeb Teams/Zoom/Meet.\n  * K\u1ef9 thu\u1eadt \u00e9p AI l\u1ecdc nhi\u1ec5u, tr\u00edch xu\u1ea5t \u0111\u00fang: (1) Key Decisions, (2) Action Items (Ai l\u00e0m - Vi\u1ec7c g\u00ec - Deadline), (3) Open Questions.\n* **01:10 - 02:10 (60m) \u2014 Live Demo: Chuy\u1ec3n Transcript th\u00f4 th\u00e0nh Meeting Notes**\n  * Trainer demo tr\u1ef1c ti\u1ebfp v\u1edbi 1 \u0111o\u1ea1n transcript cu\u1ed9c h\u1ecdp Refinement 15 ph\u00fat r\u1eafc r\u1ed1i.\n  * M\u1ed5 x\u1ebb c\u00e1ch x\u1eed l\u00fd khi AI b\u1ecba ra Action Item (Hallucination check) v\u00e0 c\u00e1ch ch\u1ec9nh prompt \u0111\u1ec3 b\u1eaft AI xu\u1ea5t ra \u0111\u1ecbnh d\u1ea1ng B\u1ea3ng Markdown.\n* **02:10 - 02:40 (30m) \u2014 Mini Guided-Practice t\u1ea1i l\u1edbp**\n  * Trainer c\u1ea5p 1 \u0111o\u1ea1n transcript m\u1eabu ng\u1eafn (5 ph\u00fat). H\u1ecdc vi\u00ean d\u00f9ng Prompt seed d\u00e1n v\u00e0o Claude/ChatGPT \u0111\u1ec3 sinh ra Meeting Notes trong 15 ph\u00fat.\n* **02:40 - 03:00 (20m) \u2014 Giao B\u00e0i t\u1eadp v\u1ec1 nh\u00e0 & Q&A**\n\n#### \ud83d\udcdd B\u00e0i T\u1eadp V\u1ec1 Nh\u00e0 Sau Bu\u1ed5i 2 (Homework B02)\n* **\u0110\u1ec1 b\u00e0i (Th\u1ef1c h\u00e0nh d\u1ef1 \u00e1n th\u1eadt):** \n  * L\u1ea5y 1 file transcript cu\u1ed9c h\u1ecdp TH\u1eacT trong tu\u1ea7n c\u1ee7a d\u1ef1 \u00e1n b\u1ea1n \u0111ang qu\u1ea3n l\u00fd.\n  * D\u00f9ng AI t\u1ea1o b\u1ea3n Meeting Notes ch\u00ednh th\u1ee9c + 1 Email t\u00f3m t\u1eaft g\u1eedi cho Stakeholders.\n* **Quy tr\u00ecnh n\u1ed9p & Peer Review:** \n  * N\u1ed9p b\u00e0i l\u00ean k\u00eanh chung. Ph\u00e2n c\u00f4ng c\u1eb7p \u0111\u00f4i ch\u1ea5m ch\u00e9o (Peer Review) ki\u1ec3m tra xem c\u00f3 th\u00f4ng tin n\u00e0o b\u1ecb AI b\u1ecba ra kh\u00f4ng.\n\n---\n\n### Bu\u1ed5i 3: Quality Gate & Token Economics C\u01a1 B\u1ea3n\n* **M\u00e3 bu\u1ed5i:** B03 (Tham chi\u1ebfu Kh\u00f3a 3)\n* **Th\u1eddi l\u01b0\u1ee3ng:** 2.5 - 3 ti\u1ebfng (180 ph\u00fat)\n* **M\u1ee5c ti\u00eau:** N\u1eafm v\u1eefng kh\u00e1i ni\u1ec7m Quality Gate (C\u1ed5ng ch\u1ea5t l\u01b0\u1ee3ng); hi\u1ec3u Token Cost l\u00e0 g\u00ec, c\u00e1ch \u0111\u1ecdc Dashboard chi ph\u00ed AI tool.\n\n#### Timetable Chi Ti\u1ebft T\u1ea1i L\u1edbp (180 ph\u00fat)\n* **00:00 - 00:30 (30m) \u2014 Review B\u00e0i t\u1eadp B02 & Ch\u1eefa Meeting Notes th\u1eadt**\n  * Trainer chi\u1ebfu 2 b\u1ea3n Meeting Notes b\u00e0i t\u1eadp c\u1ee7a h\u1ecdc vi\u00ean l\u00ean m\u00e0n h\u00ecnh, ch\u1ec9 ra c\u00e1c l\u1ed7i Hallucination th\u01b0\u1eddng g\u1eb7p.\n* **00:30 - 01:10 (40m) \u2014 L\u00fd thuy\u1ebft Quality Gate & Token Economics**\n  * Quy tr\u00ecnh Quality Gate 4 b\u01b0\u1edbc: Self-check -> AI Audit -> Human Peer Review -> Merge.\n  * Token Economics: Input vs Output Token, Context Window, c\u00e1ch \u0111\u1ecdc Dashboard chi ph\u00ed OpenAI/Anthropic/Azure.\n* **01:10 - 02:10 (60m) \u2014 Live Demo: Ph\u00e2n t\u00edch Dashboard Token & Role-play Quality Gate**\n  * Trainer Demo \u0111\u1ecdc file log Token Usage, ph\u00e1t hi\u1ec7n \u0111i\u1ec3m b\u1ea5t th\u01b0\u1eddng (spike) do agent ch\u1ea1y l\u1eb7p.\n  * Trainer Demo k\u1ecbch b\u1ea3n \u1ee9ng ph\u00f3 khi Dev \u0111\u00f2i bypass Quality Gate v\u00ec ch\u00e1y deadline.\n* **02:10 - 02:40 (30m) \u2014 Mini Guided-Practice t\u1ea1i l\u1edbp**\n  * Cho 1 b\u1ea3ng d\u1eef li\u1ec7u Token m\u1eabu. H\u1ecdc vi\u00ean g\u00f5 l\u1ec7nh nh\u1edd AI ph\u00e2n t\u00edch top 3 task t\u1ed1n token nh\u1ea5t trong 15 ph\u00fat.\n* **02:40 - 03:00 (20m) \u2014 Giao B\u00e0i t\u1eadp v\u1ec1 nh\u00e0 & T\u1ed5ng k\u1ebft L1**\n\n#### \ud83d\udcdd B\u00e0i T\u1eadp V\u1ec1 Nh\u00e0 Sau Bu\u1ed5i 3 (Homework B03)\n* **\u0110\u1ec1 b\u00e0i:** \n  1. Ho\u00e0n th\u00e0nh b\u00e0i Quiz 15 c\u00e2u v\u1ec1 Token Economics & Quality Gate (\u0111\u1ea1t \u2265 70%).\n  2. Vi\u1ebft 1 k\u1ecbch b\u1ea3n \u1ee9ng ph\u00f3 (500 t\u1eeb) khi kh\u00e1ch h\u00e0ng ho\u1eb7c Tech Lead y\u00eau c\u1ea7u b\u1ecf qua Quality Gate trong d\u1ef1 \u00e1n c\u1ee7a b\u1ea1n.\n* **\u0110i\u1ec1u ki\u1ec7n T\u1ed1t nghi\u1ec7p L1:** Pass Quiz + Sign-off b\u00e0i t\u1eadp B01, B02, B03.\n\n---\n\n# GIAI \u0110O\u1ea0N 2: STANDARD PM TASKS & ARTIFACTS (L1 \u2192 L2)\n\n---\n\n### Bu\u1ed5i 4: Prompt Engineering C\u01a1 B\u1ea3n Cho PM\n* **M\u00e3 bu\u1ed5i:** B04 (Tham chi\u1ebfu Kh\u00f3a 5)\n* **Th\u1eddi l\u01b0\u1ee3ng:** 2.5 - 3 ti\u1ebfng (180 ph\u00fat)\n* **M\u1ee5c ti\u00eau:** Th\u00e0nh th\u1ea1o c\u00f4ng th\u1ee9c vi\u1ebft prompt 5 th\u00e0nh ph\u1ea7n chu\u1ea9n (Role - Context - Task - Format - Constraint); bi\u1ebft k\u1ef9 thu\u1eadt b\u1ed5 sung v\u00ed d\u1ee5 (Few-shot prompting).\n\n#### Timetable Chi Ti\u1ebft T\u1ea1i L\u1edbp (180 ph\u00fat)\n* **00:00 - 00:30 (30m) \u2014 Review & T\u1ed5ng k\u1ebft Giai \u0111o\u1ea1n L1**\n  * Ch\u00fac m\u1eebng c\u00e1c PM ho\u00e0n th\u00e0nh L1, trao Badge L1.\n* **00:30 - 01:10 (40m) \u2014 Khung C\u1ea5u Tr\u00fac Prompt Chu\u1ea9n (RISEN / RCTFC Framework)**\n  * 5 th\u00e0nh ph\u1ea7n chu\u1ea9n: Role - Context - Task - Format - Constraint.\n  * K\u1ef9 thu\u1eadt Few-shot (\u0111\u01b0a v\u00ed d\u1ee5 m\u1eabu) & Refinement Loop (s\u1eeda l\u1ed7i h\u1ed9i tho\u1ea1i).\n* **01:10 - 02:10 (60m) \u2014 Live Demo: Chuy\u1ec3n Prompt \"r\u00e1c\" th\u00e0nh Prompt chuy\u00ean nghi\u1ec7p**\n  * Trainer demo bi\u1ebfn c\u00e2u l\u1ec7nh ng\u1eafn \"vi\u1ebft PRD cho t\u00f4i\" th\u00e0nh prompt 5 ph\u1ea7n chi ti\u1ebft.\n  * Demo k\u1ef9 thu\u1eadt Few-shot: \u0110\u01b0a 1 \u0111o\u1ea1n User Story m\u1eabu \u0111\u1ec3 AI b\u1eaft ch\u01b0\u1edbc \u0111\u00fang chu\u1ea9n c\u00f4ng ty.\n* **02:10 - 02:40 (30m) \u2014 Mini Guided-Practice t\u1ea1i l\u1edbp**\n  * H\u1ecdc vi\u00ean vi\u1ebft 1 prompt chu\u1ea9n 5 th\u00e0nh ph\u1ea7n cho t\u00e1c v\u1ee5 \"T\u00f3m t\u1eaft r\u1ee7i ro d\u1ef1 \u00e1n\" trong 15 ph\u00fat.\n* **02:40 - 03:00 (20m) \u2014 Giao B\u00e0i t\u1eadp v\u1ec1 nh\u00e0 & Q&A**\n\n#### \ud83d\udcdd B\u00e0i T\u1eadp V\u1ec1 Nh\u00e0 Sau Bu\u1ed5i 4 (Homework B04)\n* **\u0110\u1ec1 b\u00e0i (Th\u1ef1c h\u00e0nh d\u1ef1 \u00e1n th\u1eadt):** \n  * Vi\u1ebft **3 Prompt chu\u1ea9n 5 th\u00e0nh ph\u1ea7n** \u1ee9ng d\u1ee5ng cho 3 c\u00f4ng vi\u1ec7c th\u1ef1c t\u1ebf trong tu\u1ea7n t\u1edbi c\u1ee7a d\u1ef1 \u00e1n b\u1ea1n (g\u1ed3m 1 prompt ph\u00e2n t\u00edch requirement, 1 prompt vi\u1ebft mail g\u1eedi kh\u00e1ch, 1 prompt t\u1ed5ng h\u1ee3p task).\n* **Quy tr\u00ecnh n\u1ed9p & Peer Review:** N\u1ed9p l\u00ean kho Prompt c\u00e1 nh\u00e2n, \u0111\u1ed5i b\u00e0i cho b\u1ea1n b\u00ean c\u1ea1nh review theo Rubric 5 th\u00e0nh ph\u1ea7n.\n\n---\n\n### Bu\u1ed5i 5: AI-Assisted User Story & Acceptance Criteria (AC)\n* **M\u00e3 bu\u1ed5i:** B05 (Tham chi\u1ebfu Kh\u00f3a 6)\n* **Th\u1eddi l\u01b0\u1ee3ng:** 2.5 - 3 ti\u1ebfng (180 ph\u00fat)\n* **M\u1ee5c ti\u00eau:** D\u00f9ng AI generate User Story t\u1eeb requirement th\u00f4, t\u1ea1o Acceptance Criteria theo chu\u1ea9n Given-When-Then; ph\u00e1t hi\u1ec7n m\u01a1 h\u1ed3 & edge case b\u1eb1ng AI.\n\n#### Timetable Chi Ti\u1ebft T\u1ea1i L\u1edbp (180 ph\u00fat)\n* **00:00 - 00:30 (30m) \u2014 Review B\u00e0i t\u1eadp B04 & S\u1eeda 3 Prompt m\u1eabu**\n  * Trainer ch\u1eefa 3 b\u00e0i prompt v\u1ec1 nh\u00e0 ti\u00eau bi\u1ec3u, ch\u1ec9 ra c\u00e1c l\u1ed7i thi\u1ebfu Constraint ho\u1eb7c thi\u1ebfu Context.\n* **00:30 - 01:10 (40m) \u2014 Quy tr\u00ecnh 3 b\u01b0\u1edbc t\u1ea1o User Story & AC v\u1edbi AI**\n  * B\u01b0\u1edbc 1: Input Requirement -> AI draft User Story breakdown.\n  * B\u01b0\u1edbc 2: D\u00e1n Story -> AI generate AC (Given-When-Then).\n  * B\u01b0\u1edbc 3: AI Challenge (Y\u00eau c\u1ea7u AI \u0111\u00f3ng vai QA t\u00ecm Edge cases \u1ea9n).\n* **01:10 - 02:10 (60m) \u2014 Live Demo: T\u00ecm 10 Edge Cases \u1ea9n cho 1 t\u00ednh n\u0103ng**\n  * Trainer demo l\u1ea5y 1 t\u00ednh n\u0103ng \"\u0110\u0103ng k\u00fd t\u00e0i kho\u1ea3n\" -> \u0110\u01b0a prompt cho AI \u0111\u00f3ng vai \"QA kh\u00f3 t\u00ednh\" \u0111\u1ec3 b\u1edbi ra 10 l\u1ed7i ti\u1ec1m \u1ea9n v\u1ec1 m\u1ea1ng, OTP, k\u00fd t\u1ef1 \u0111\u1eb7c bi\u1ec7t.\n* **02:10 - 02:40 (30m) \u2014 Mini Guided-Practice t\u1ea1i l\u1edbp**\n  * H\u1ecdc vi\u00ean cho AI t\u1ea1o 1 User Story + 3 d\u00f2ng AC cho 1 t\u00ednh n\u0103ng \u0111\u01a1n gi\u1ea3n trong 15 ph\u00fat.\n* **02:40 - 03:00 (20m) \u2014 Giao B\u00e0i t\u1eadp v\u1ec1 nh\u00e0 & Q&A**\n\n#### \ud83d\udcdd B\u00e0i T\u1eadp V\u1ec1 Nh\u00e0 Sau Bu\u1ed5i 5 (Homework B05)\n* **\u0110\u1ec1 b\u00e0i (Th\u1ef1c h\u00e0nh d\u1ef1 \u00e1n th\u1eadt):** \n  * Ch\u1ecdn 1 Epics/Feature TH\u1eacT trong d\u1ef1 \u00e1n hi\u1ec7n t\u1ea1i.\n  * D\u00f9ng AI t\u1ea1o b\u1ed9 **5 User Story + Acceptance Criteria \u0111\u1ea7y \u0111\u1ee7** (Happy path + Unhappy path) + Danh s\u00e1ch Edge Cases \u0111\u00e3 \u0111\u01b0\u1ee3c AI audit.\n* **Quy tr\u00ecnh n\u1ed9p & Peer Review:** N\u1ed9p l\u00ean Jira/Backlog nh\u00e1p, Peer Review ki\u1ec3m tra t\u00ednh r\u00f5 r\u00e0ng tr\u01b0\u1edbc khi chuy\u1ec3n cho Dev.\n\n---\n\n### Bu\u1ed5i 6: AI-Assisted PRD (Draft PRD < 30 Ph\u00fat)\n* **M\u00e3 bu\u1ed5i:** B06 (Tham chi\u1ebfu Kh\u00f3a 7)\n* **Th\u1eddi l\u01b0\u1ee3ng:** 2.5 - 3 ti\u1ebfng (180 ph\u00fat)\n* **M\u1ee5c ti\u00eau:** \u0110\u1ea1t c\u1ed9t m\u1ed1c t\u1ea1o b\u1ea3n th\u1ea3o PRD (Product Requirement Document) \u0111\u1ea7y \u0111\u1ee7 c\u1ea5u tr\u00fac t\u1eeb Brief ng\u1eafn trong **d\u01b0\u1edbi 30 ph\u00fat**.\n\n#### Timetable Chi Ti\u1ebft T\u1ea1i L\u1edbp (180 ph\u00fat)\n* **00:00 - 00:30 (30m) \u2014 Review B\u00e0i t\u1eadp B05 & Ch\u1eefa User Story th\u1eadt**\n  * Trainer review b\u1ed9 User Story & AC c\u1ee7a 2 h\u1ecdc vi\u00ean, \u0111\u00e1nh gi\u00e1 \u0111\u1ed9 ph\u1ee7 c\u1ee7a Edge cases.\n* **00:30 - 01:10 (40m) \u2014 Framework T\u1ed1c \u0110\u1ed9 T\u1ea1o PRD V\u1edbi AI**\n  * C\u1ea5u tr\u00fac PRD 6 m\u1ee5c chu\u1ea9n.\n  * Chi\u1ebfn l\u01b0\u1ee3c \"Ph\u00e2n r\u00e3 Section\" (T\u1ea1o khung -> Nh\u1ed3i chi ti\u1ebft t\u1eebng m\u1ee5c -> AI Self-Review).\n* **01:10 - 02:10 (60m) \u2014 Live Demo: 20 ph\u00fat t\u1eeb Brief \u0111\u1ebfn PRD ho\u00e0n ch\u1ec9nh**\n  * Trainer thao t\u00e1c tr\u1ef1c ti\u1ebfp tr\u00ean Claude: Ph\u00fat 0-3 t\u1ea1o khung, ph\u00fat 4-12 \u0111i\u1ec1n Problem/Goal, ph\u00fat 13-18 \u0111i\u1ec1n Functional Specs, ph\u00fat 19-20 AI t\u1ef1 audit.\n* **02:10 - 02:40 (30m) \u2014 Mini Guided-Practice t\u1ea1i l\u1edbp**\n  * Cho 1 \u0111o\u1ea1n Brief ng\u1eafn 1 trang. H\u1ecdc vi\u00ean d\u00f9ng AI t\u1ea1o khung PRD v\u00e0 \u0111i\u1ec1n 2 m\u1ee5c \u0111\u1ea7u ti\u00ean (Problem & Goals) trong 15 ph\u00fat.\n* **02:40 - 03:00 (20m) \u2014 Giao B\u00e0i t\u1eadp v\u1ec1 nh\u00e0 & Q&A**\n\n#### \ud83d\udcdd B\u00e0i T\u1eadp V\u1ec1 Nh\u00e0 Sau Bu\u1ed5i 6 (Homework B06 - \u0110\u1ea0T COT M\u1ed0C L2)\n* **\u0110\u1ec1 b\u00e0i (Th\u1ef1c h\u00e0nh d\u1ef1 \u00e1n th\u1eadt):** \n  * L\u1ea5y 1 Y\u00eau c\u1ea7u/Brief t\u00ednh n\u0103ng TH\u1eacT s\u1eafp tri\u1ec3n khai c\u1ee7a d\u1ef1 \u00e1n b\u1ea1n.\n  * Thao t\u00e1c t\u1ea1o 1 b\u1ea3n **PRD Draft ho\u00e0n ch\u1ec9nh 6 m\u1ee5c trong d\u01b0\u1edbi 30 ph\u00fat** b\u1eb1ng AI.\n* **Quy tr\u00ecnh n\u1ed9p & Peer Review:** N\u1ed9p b\u00e0i \u0111\u00ednh k\u00e8m video quay m\u00e0n h\u00ecnh ho\u1eb7c log th\u1eddi gian l\u00e0m b\u00e0i (<30m). Peer review \u0111\u00e1nh gi\u00e1 ch\u1ea5t l\u01b0\u1ee3ng PRD.\n\n---\n\n### Bu\u1ed5i 7: AI-Assisted Status Report Cho Stakeholders (Non-Technical)\n* **M\u00e3 bu\u1ed5i:** B07 (Tham chi\u1ebfu Kh\u00f3a 8)\n* **Th\u1eddi l\u01b0\u1ee3ng:** 2.5 - 3 ti\u1ebfng (180 ph\u00fat)\n* **M\u1ee5c ti\u00eau:** D\u00f9ng AI d\u1ecbch thu\u1eadt ng\u1eef k\u1ef9 thu\u1eadt/s\u1ed1 li\u1ec7u sprint th\u00f4 th\u00e0nh b\u00e1o c\u00e1o 1 trang ng\u1eafn g\u1ecdn, ng\u00f4n ng\u1eef kinh doanh (Business Value) khi\u1ebfn Stakeholders hi\u1ec3u ngay.\n\n#### Timetable Chi Ti\u1ebft T\u1ea1i L\u1edbp (180 ph\u00fat)\n* **00:00 - 00:30 (30m) \u2014 Review B\u00e0i t\u1eadp B06 (PRD Draft < 30m)**\n  * Trainer tuy\u00ean d\u01b0\u01a1ng c\u00e1c b\u00e0i PRD l\u00e0m d\u01b0\u1edbi 30 ph\u00fat \u0111\u1ea1t ch\u1ea5t l\u01b0\u1ee3ng t\u1ed1t.\n* **00:30 - 01:10 (40m) \u2014 T\u01b0 duy D\u1ecbch Thu\u1eadt B\u00e1o C\u00e1o Cho Stakeholders**\n  * Chuy\u1ec3n \u0111\u1ed5i Technical Metrics (Velocity, Defect density, Refactoring) -> Business Value (Lead Time, Cost, Customer Experience).\n  * Prompt Template \"Executive Status Report 4 \u00f4 vu\u00f4ng\".\n* **01:10 - 02:10 (60m) \u2014 Live Demo: Bi\u1ebfn Sprint Log h\u1ed7n lo\u1ea1n th\u00e0nh B\u00e1o c\u00e1o 1 trang**\n  * Trainer d\u00e1n log sprint g\u1ed3m bug, task tr\u1ec5, token cost t\u0103ng -> AI vi\u1ebft th\u00e0nh Executive Summary 1 trang c\u1ef1c k\u1ef3 l\u1ecbch s\u1ef1 v\u00e0 chuy\u00ean nghi\u1ec7p.\n* **02:10 - 02:40 (30m) \u2014 Mini Guided-Practice t\u1ea1i l\u1edbp**\n  * H\u1ecdc vi\u00ean d\u00e1n 1 \u0111o\u1ea1n log bug th\u00f4 v\u00e0o AI, g\u00f5 prompt nh\u1edd AI d\u1ecbch th\u00e0nh c\u00e2u v\u0103n b\u00e1o c\u00e1o kh\u00e1ch h\u00e0ng trong 15 ph\u00fat.\n* **02:40 - 03:00 (20m) \u2014 Giao B\u00e0i t\u1eadp v\u1ec1 nh\u00e0 & Q&A**\n\n#### \ud83d\udcdd B\u00e0i T\u1eadp V\u1ec1 Nh\u00e0 Sau Bu\u1ed5i 7 (Homework B07)\n* **\u0110\u1ec1 b\u00e0i (Th\u1ef1c h\u00e0nh d\u1ef1 \u00e1n th\u1eadt):** \n  * L\u1ea5y d\u1eef li\u1ec7u Sprint tu\u1ea7n n\u00e0y c\u1ee7a d\u1ef1 \u00e1n th\u1eadt.\n  * D\u00f9ng AI t\u1ea1o b\u1ea3n **Status Report 1 trang d\u00e0nh cho Stakeholder Non-technical** (COO/CMO/Kh\u00e1ch h\u00e0ng).\n* **Quy tr\u00ecnh n\u1ed9p & Peer Review:** N\u1ed9p b\u00e0i cho Mentor review tr\u01b0\u1edbc khi g\u1eedi th\u1eadt cho S\u1ebfp/Kh\u00e1ch h\u00e0ng.\n\n---\n\n### Bu\u1ed5i 8: Token Tracking & ROI Calculation (N\u1ed9p Drill 1)\n* **M\u00e3 bu\u1ed5i:** B08 (Tham chi\u1ebfu Kh\u00f3a 9 & 11)\n* **Th\u1eddi l\u01b0\u1ee3ng:** 2.5 - 3 ti\u1ebfng (180 ph\u00fat)\n* **M\u1ee5c ti\u00eau:** Th\u1ef1c h\u00e0nh k\u1ef9 n\u0103ng theo d\u00f5i chi ph\u00ed Token & H\u01b0\u1edbng d\u1eabn ho\u00e0n th\u00e0nh **Drill 1 (T\u00ednh to\u00e1n ROI \u1ee9ng d\u1ee5ng AI)**.\n\n#### Timetable Chi Ti\u1ebft T\u1ea1i L\u1edbp (180 ph\u00fat)\n* **00:00 - 00:30 (30m) \u2014 Review B\u00e0i t\u1eadp B07 & Ch\u1eefa Status Report**\n  * Trainer nh\u1eadn x\u00e9t c\u00e1c m\u1eabu Status Report g\u1eedi Stakeholder.\n* **00:30 - 01:10 (40m) \u2014 Ph\u01b0\u01a1ng ph\u00e1p T\u00ednh ROI & Theo D\u00f5i Token Cost**\n  * C\u00f4ng th\u1ee9c ROI (%): $(Net Savings - Tool Cost) / Tool Cost \times 100\\%$.\n  * Quy \u0111\u1ed5i gi\u1edd l\u00e0m ti\u1ebft ki\u1ec7m c\u1ee7a PM/Dev th\u00e0nh ti\u1ec1n.\n  * Vi\u1ebft Prompt \u0111\u1ec3 AI t\u00f3m t\u1eaft Dashboard Token Usage h\u00e0ng tu\u1ea7n.\n* **01:10 - 02:10 (60m) \u2014 Live Demo: L\u1eadp B\u1ea3ng T\u00ednh ROI Defendable Tr\u01b0\u1edbc CFO**\n  * Trainer demo nh\u1eadp s\u1ed1 li\u1ec7u d\u1ef1 \u00e1n 3 th\u00e1ng v\u00e0o AI -> AI h\u1ed7 tr\u1ee3 t\u00ednh to\u00e1n v\u00e0 vi\u1ebft b\u00e0i lu\u1eadn b\u1ea3o v\u1ec7 ng\u00e2n s\u00e1ch mua license AI tr\u01b0\u1edbc CFO.\n* **02:10 - 02:40 (30m) \u2014 Mini Guided-Practice t\u1ea1i l\u1edbp**\n  * H\u1ecdc vi\u00ean t\u00ednh nhanh ROI c\u00e1 nh\u00e2n khi d\u00f9ng ChatGPT Plus trong 1 th\u00e1ng v\u1eeba qua (15 ph\u00fat).\n* **02:40 - 03:00 (20m) \u2014 Giao \u0110\u1ec1 B\u00e0i Drill 1 (B\u1eaft bu\u1ed9c L2)**\n\n#### \ud83d\udcdd B\u00e0i T\u1eadp V\u1ec1 Nh\u00e0 Sau Bu\u1ed5i 8 (N\u1ed8P B\u00c0I DRILL 1 CH\u00cdNH TH\u1ee8C)\n* **\u0110\u1ec1 b\u00e0i Drill 1:** \n  * Nh\u1eadn b\u1ed9 s\u1ed1 li\u1ec7u b\u00e0i to\u00e1n m\u1eabu + L\u1ea5y s\u1ed1 li\u1ec7u th\u1ef1c t\u1ebf d\u1ef1 \u00e1n m\u00ecnh.\n  * L\u1eadp B\u1ea3ng t\u00ednh ROI \u0111\u1ea7y \u0111\u1ee7 + Vi\u1ebft b\u00e0i gi\u1ea3i tr\u00ecnh 500 t\u1eeb b\u1ea3o v\u1ec7 tr\u01b0\u1edbc CFO/Tech Lead b\u1eb1ng AI.\n* **Quy tr\u00ecnh n\u1ed9p:** N\u1ed9p b\u00e0i Drill 1 ch\u00ednh th\u1ee9c \u0111\u1ec3 l\u1ea5y \u0111i\u1ec3m ch\u1ee9ng nh\u1eadn L2.\n\n---\n\n### Bu\u1ed5i 9: Quality Gate Role-Play & X\u1eed L\u00fd T\u00ecnh Hu\u1ed1ng R\u1ee7i Ro (Pass Drill 5)\n* **M\u00e3 bu\u1ed5i:** B09 (Tham chi\u1ebfu Kh\u00f3a 10)\n* **Th\u1eddi l\u01b0\u1ee3ng:** 2.5 - 3 ti\u1ebfng (180 ph\u00fat)\n* **M\u1ee5c ti\u00eau:** Th\u1ef1c h\u00e0nh k\u1ecbch b\u1ea3n \u0111\u00e0m ph\u00e1n & Gi\u1eef v\u1eefng C\u1ed5ng Ch\u1ea5t l\u01b0\u1ee3ng (Quality Gate) tr\u01b0\u1edbc \u00e1p l\u1ef1c ti\u1ebfn \u0111\u1ed9.\n\n#### Timetable Chi Ti\u1ebft T\u1ea1i L\u1edbp (180 ph\u00fat)\n* **00:00 - 00:30 (30m) \u2014 Review B\u00e0i n\u1ed9p Drill 1 & Ch\u1ea5m \u0111i\u1ec3m ROI**\n  * Trainer c\u00f4ng b\u1ed1 k\u1ebft qu\u1ea3 ch\u1ea5m Drill 1.\n* **00:30 - 01:10 (40m) \u2014 3 K\u1ecbch b\u1ea3n S\u1ee9c \u00e9p Quality Gate & K\u1ef9 thu\u1eadt \u0110\u00e0m ph\u00e1n**\n  * S\u1ee9c \u00e9p t\u1eeb Kh\u00e1ch h\u00e0ng, s\u1ee9c \u00e9p t\u1eeb Dev Lead, s\u1ee9c \u00e9p khi AI score th\u1ea5p.\n  * D\u00f9ng AI chu\u1ea9n b\u1ecb k\u1ecbch b\u1ea3n \u0111\u00e0m ph\u00e1n (Talking Points) v\u00e0 quy tr\u00ecnh Emergency Bypass.\n* **01:10 - 02:10 (60m) \u2014 Live Demo & Role-play M\u1eabu T\u1ea1i L\u1edbp**\n  * Trainer \u0111\u00f3ng vai Tech Lead \u0111\u00f2i bypass Quality Gate vs 1 H\u1ecdc vi\u00ean \u0111\u00f3ng vai PM.\n  * Ph\u00e2n t\u00edch c\u00e1c c\u00e2u \u0111\u00e1p tr\u1ea3 th\u00f4ng minh gi\u00fap PM gi\u1eef v\u1eefng c\u1ed5ng ch\u1ea5t l\u01b0\u1ee3ng.\n* **02:10 - 02:40 (30m) \u2014 Mini Guided-Practice (\u0110\u00f3ng vai theo c\u1eb7p 15m)**\n  * H\u1ecdc vi\u00ean chia c\u1eb7p t\u1eadp \u0111\u00f3ng vai nhanh t\u00ecnh hu\u1ed1ng kh\u00e1ch h\u00e0ng \u0111\u00f2i release g\u1ea
